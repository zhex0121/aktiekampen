<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PaperAlpha Live</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-chart-financial"></script>
    <script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8/hammer.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <style>
        :root{
            --bg:#050505; --surface:#121212; --border:#282828; --accent:#2962ff;
            --up:#00ffaa; --down:#ff3d71; --text:#ffffff; --text-dim:#b3b3b3;
        }
        body{
            font-family:'Inter',sans-serif; background:var(--bg); color:var(--text);
            margin:0; display:grid; grid-template-columns:350px 1fr 300px; height:100vh; overflow:hidden;
        }
        .market-side{ display:grid; grid-template-rows:auto 1fr; background:var(--surface); border-right:1px solid var(--border); }
        .search-box{ padding:15px; border-bottom:1px solid var(--border); }
        input{ width:100%; background:#1e1e1e; border:1px solid var(--border); padding:10px; color:white; border-radius:4px; }
        .stock-list{ overflow-y:auto; padding-right:5px; }
        .stock-item{ padding:12px 15px; border-bottom:1px solid var(--border); cursor:pointer; display:flex; justify-content:space-between; }
        .stock-item.active{ background:#222; border-left:3px solid var(--accent); }
        .main-content{ display:flex; flex-direction:column; padding:20px; }
        .chart-container{ flex-grow:1; position:relative; min-height:0; }
        .trade-side { position: relative; border-left: 1px solid var(--border); padding: 20px; background: var(--surface); }
        .logout-btn { position: absolute; top: 15px; right: 20px; }
        .btn{ width:100%; padding:12px; border:none; border-radius:4px; font-weight:bold; cursor:pointer; margin-top:10px; }
        .btn-buy{ background:var(--up); color:black; }
        .btn-sell{ background:var(--down); color:white; }
        .up{color:var(--up);} .down{color:var(--down);}
        .trade-error{ color:var(--down); font-size:0.95rem; font-weight:700; margin-bottom:10px; min-height:22px; }
        .auth-modal { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.85); display: flex; align-items: center; justify-content: center; z-index: 9999; backdrop-filter: blur(4px); }
        .auth-card { width: min(400px, 92vw); background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 30px; }
        .avatar-btn{ width:40px; height:40px; border-radius:50%; background:#1e1e1e; border:1px solid var(--border); color:white; cursor:pointer; }
    </style>
</head>
<body>

<div class="market-side">
    <div class="search-box"><input type="text" id="searchInput" placeholder="Sök aktie..." oninput="filtreraAktier()"></div>
    <div class="stock-list" id="stockList"></div>
</div>

<div class="main-content">
    <div style="margin-bottom:10px;">
        <button class="btn" style="width:auto;background:#1e1e1e;color:white;" onclick="setChartMode('live')" id="liveBtn">REALTID</button>
        <button class="btn" style="width:auto;background:#1e1e1e;color:white;" onclick="setChartMode('history')" id="historyBtn">HISTORISKT</button>
    </div>
    <div>
        <h2 id="activeSymbol">Välj en aktie</h2>
        <h1 id="activePrice">0.00</h1>
    </div>
    <div class="chart-container"><canvas id="mainChart"></canvas></div>
</div>

<div class="trade-side">
    <div id="accountBar" style="display:none; margin-bottom:15px;">
        <button id="avatarBtn" class="avatar-btn"></button>
        <button class="btn logout-btn" style="width:auto; padding:5px 10px;" onclick="handleLogout()">LOGOUT</button>
    </div>
    <div class="stat-box">
        <div style="color:var(--text-dim)">Saldo</div>
        <div id="balanceDisplay" style="font-size:1.5rem; font-weight:bold;">100 000 SEK</div>
    </div>
    <div id="tradeControls" style="display:none;">
        <label style="font-size:0.8rem; color:var(--text-dim)">ANTAL</label>
        <input type="number" id="tradeAmount" value="1" min="1">
        <div id="tradeError" class="trade-error"></div>
        <button class="btn btn-buy" onclick="genomförAffär('köp')">KÖP</button>
        <button class="btn btn-sell" onclick="genomförAffär('sälj')">SÄLJ</button>
    </div>
    <div class="portfolio-list" id="portfolioDisplay"><h4>PORTFÖLJ</h4></div>
</div>

<div id="authModal" class="auth-modal">
    <div class="auth-card">
        <h3 style="text-align:center">PaperAlpha</h3>
        <input type="email" id="authEmail" placeholder="Email">
        <input type="password" id="authPassword" placeholder="Lösenord" style="margin-top:10px;">
        <div id="authError" class="trade-error" style="margin-top:10px;"></div>
        <button class="btn btn-buy" onclick="signIn()">LOGGA IN</button>
        <button class="btn btn-sell" onclick="signUp()">REGISTRERA</button>
    </div>
</div>

<script>
/* --- CONFIG & STATE --- */
const SUPABASE_URL='https://noofczjkampvgqtjqkaf.supabase.co';
const SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5vb2ZjemprYW1wdmdxdGpxa2FmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0MzM3NDcsImV4cCI6MjA5MDAwOTc0N30.0WDwZobgRdKx7yTPN9zWHe0Paa6-uQEEES5bSrwlSVM';
const { createClient } = supabase;
const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const symboler = ["AAPL", "MSFT", "GOOGL", "AMZN", "NVDA", "TSLA", "META", "SPOT", "NFLX", "MSTR"];
let aktier = {};
let aktivAktie = null;
let saldo = 100000;
let portfölj = {};
let chart = null;
let chartMode = 'live';
let liveAutoScrollEnabled = true;
let currentUser = null;
const CANDLE_MS = 60000;
const PRICE_UPDATE_MS = 5000;

/* --- API LOGIC --- */
async function fetchPrice(ticker) {
    try {
        const response = await fetch(`https://server-api-092b.onrender.com/api/price/${ticker}`);
        if (!response.ok) return null;
        const data = await response.json();
        return Number(data.c);
    } catch (e) { return null; }
}

async function startLiveUpdates() {
    setInterval(async () => {
        let direction = null;
        for (let s of symboler) {
            const oldP = aktier[s].pris;
            const newP = await fetchPrice(s);
            if (newP) {
                aktier[s].pris = newP;
                if (s === aktivAktie) direction = newP > oldP ? 'up' : 'down';
                
                // Update Candle
                let now = Date.now();
                let last = aktier[s].history[aktier[s].history.length-1];
                if (!last || now - last.x >= CANDLE_MS) {
                    aktier[s].history.push({ x: now, o: newP, h: newP, l: newP, c: newP });
                } else {
                    last.c = newP;
                    last.h = Math.max(last.h, newP);
                    last.l = Math.min(last.l, newP);
                }
            }
        }
        uppdateraAktivUI(direction);
        renderStockList(document.getElementById('searchInput').value);
        if (chartMode === 'live') updateChartView();
    }, PRICE_UPDATE_MS);
}

/* --- UI & CHART --- */
function renderStockList(filter="") {
    const container = document.getElementById('stockList');
    container.innerHTML = "";
    symboler.filter(s => s.toLowerCase().includes(filter.toLowerCase())).forEach(s => {
        const div = document.createElement('div');
        div.className = `stock-item ${aktivAktie === s ? 'active' : ''}`;
        div.onclick = () => väljAktie(s);
        div.innerHTML = `<b>${s}</b> <span>${aktier[s].pris.toFixed(2)}</span>`;
        container.appendChild(div);
    });
}

function väljAktie(ticker) {
    aktivAktie = ticker;
    document.getElementById('activeSymbol').innerText = ticker;
    if (currentUser) document.getElementById('tradeControls').style.display = 'block';
    initChart();
}

function initChart() {
    const ctx = document.getElementById('mainChart').getContext('2d');
    if (chart) chart.destroy();
    chart = new Chart(ctx, {
        type: 'candlestick',
        data: { datasets: [{ data: aktier[aktivAktie].history, color: { up: '#00ffaa', down: '#ff3d71' } }] },
        options: {
            responsive: true, maintainAspectRatio: false, animation: false,
            scales: { x: { type: 'time', time: { unit: 'minute' } } },
            plugins: { zoom: { pan: { enabled: true }, zoom: { wheel: { enabled: true } } } }
        }
    });
}

function updateChartView() {
    if (!chart || !aktivAktie) return;
    chart.data.datasets[0].data = aktier[aktivAktie].history;
    const last = aktier[aktivAktie].history[aktier[aktivAktie].history.length-1];
    if (last && liveAutoScrollEnabled) {
        chart.options.scales.x.max = last.x + 300000;
        chart.options.scales.x.min = last.x - 900000;
    }
    chart.update('none');
}

function uppdateraAktivUI(dir) {
    const el = document.getElementById('activePrice');
    el.innerText = aktier[aktivAktie].pris.toFixed(2) + " USD";
    el.className = dir || "";
    setTimeout(() => el.className = "", 700);
}

/* --- AUTH & SUPABASE --- */
async function initSupabaseAuth() {
    const { data: { session } } = await supabaseClient.auth.getSession();
    if (session) handleLoginSuccess(session.user);
    
    supabaseClient.auth.onAuthStateChange((event, session) => {
        if (event === 'SIGNED_IN') handleLoginSuccess(session.user);
        if (event === 'SIGNED_OUT') location.reload();
    });
}

function handleLoginSuccess(user) {
    currentUser = user;
    document.getElementById('authModal').style.display = 'none';
    document.getElementById('accountBar').style.display = 'block';
    document.getElementById('avatarBtn').innerText = user.email[0].toUpperCase();
    if (aktivAktie) document.getElementById('tradeControls').style.display = 'block';
    loadProfile();
}

async function loadProfile() {
    const { data } = await supabaseClient.from('profiles').select('*').eq('user_id', currentUser.id).single();
    if (data) { saldo = data.balance; portfölj = data.portfolio || {}; }
    uppdateraPortföljUI();
}

async function saveProfile() {
    await supabaseClient.from('profiles').upsert({ user_id: currentUser.id, balance: saldo, portfolio: portfölj });
}

/* --- TRADING --- */
async function genomförAffär(typ) {
    const antal = parseInt(document.getElementById('tradeAmount').value);
    const pris = aktier[aktivAktie].pris;
    const kostnad = pris * antal;

    if (typ === 'köp' && saldo >= kostnad) {
        saldo -= kostnad;
        if (!portfölj[aktivAktie]) portfölj[aktivAktie] = { antal: 0, totaltInköp: 0 };
        portfölj[aktivAktie].antal += antal;
        portfölj[aktivAktie].totaltInköp += kostnad;
    } else if (typ === 'sälj' && portfölj[aktivAktie]?.antal >= antal) {
        saldo += kostnad;
        portfölj[aktivAktie].antal -= antal;
        if (portfölj[aktivAktie].antal === 0) delete portfölj[aktivAktie];
    } else {
        document.getElementById('tradeError').innerText = "Otillräckligt innehav/saldo";
        return;
    }
    uppdateraPortföljUI();
    saveProfile();
}

function uppdateraPortföljUI() {
    document.getElementById('balanceDisplay').innerText = saldo.toLocaleString() + " USD";
    const container = document.getElementById('portfolioDisplay');
    container.innerHTML = "<h4>PORTFÖLJ</h4>";
    for (let s in portfölj) {
        container.innerHTML += `<div>${s}: ${portfölj[s].antal} st</div>`;
    }
}

async function signIn() {
    const email = document.getElementById('authEmail').value;
    const password = document.getElementById('authPassword').value;
    const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
    if (error) document.getElementById('authError').innerText = error.message;
}

async function signUp() {
    const email = document.getElementById('authEmail').value;
    const password = document.getElementById('authPassword').value;
    const { error } = await supabaseClient.auth.signUp({ email, password });
    if (error) document.getElementById('authError').innerText = error.message;
}

function handleLogout() { supabaseClient.auth.signOut(); }

/* --- INIT --- */
(async () => {
    for (let s of symboler) {
        aktier[s] = { pris: 0, history: [] };
        const p = await fetchPrice(s);
        aktier[s].pris = p || 150;
        aktier[s].history.push({ x: Date.now(), o: aktier[s].pris, h: aktier[s].pris, l: aktier[s].pris, c: aktier[s].pris });
    }
    renderStockList();
    initSupabaseAuth();
    väljAktie("AAPL");
    startLiveUpdates();
})();
</script>
</body>
</html>
