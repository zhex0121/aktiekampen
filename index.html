<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Handelsplattform</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

:root{

--bg:#050505;
--surface:#121212;
--border:#282828;
--accent:#2962ff;
--up:#00ffaa;
--down:#ff3d71;
--text:#ffffff;
--text-dim:#b3b3b3;

}

body{

font-family:'Inter',-apple-system,sans-serif;

background:var(--bg);

color:var(--text);

margin:0;

display:grid;

grid-template-columns:350px 1fr 300px;

height:100vh;

overflow:hidden;

}

/* Marknadslista */

.market-side{

display:grid;

grid-template-rows:auto 1fr;

height:100vh;

background:var(--surface);

border-right:1px solid var(--border);

}

.search-box{

padding:15px;

border-bottom:1px solid var(--border);

}

input{

width:100%;

background:#1e1e1e;

border:1px solid var(--border);

padding:10px;

color:white;

border-radius:4px;

box-sizing:border-box;

}

.stock-list{

overflow-y:auto;

scrollbar-width:thin;

scrollbar-color:var(--accent) transparent;

padding-right:5px;

}

.stock-item{

padding:12px 15px;

border-bottom:1px solid var(--border);

cursor:pointer;

display:flex;

justify-content:space-between;

transition:background 0.2s;

}

.stock-item:hover{

background:#1a1a1a;

}

.stock-item.active{

background:#222;

border-left:3px solid var(--accent);

}

/* Main */

.main-content{

display:flex;

flex-direction:column;

padding:20px;

background:var(--bg);

overflow:hidden;

}

.chart-container{

flex-grow:1;

position:relative;

min-height:0;

}

/* Handelssida */

.trade-side{

border-left:1px solid var(--border);

padding:20px;

background:var(--surface);

}

.stat-box{

margin-bottom:20px;

padding-bottom:20px;

border-bottom:1px solid var(--border);

}

.btn{

width:100%;

padding:12px;

border:none;

border-radius:4px;

font-weight:bold;

cursor:pointer;

margin-top:10px;

}

.btn-buy{

background:var(--up);

color:black;

}

.btn-sell{

background:var(--down);

color:white;

}

.portfolio-list{

font-size:0.85rem;

margin-top:20px;

}

.up{

color:var(--up);

}

.down{

color:var(--down);

}

</style>

</head>

<body>

<div class="market-side">

<div class="search-box">

<input
type="text"
id="searchInput"
placeholder="Sök aktie..."
oninput="filtreraAktier()">

</div>

<div
class="stock-list"
id="stockList">

</div>

</div>

<div class="main-content">

<div>

<h2 id="activeSymbol">

Välj en aktie

</h2>

<h1 id="activePrice">

0.00

</h1>

</div>

<div class="chart-container">

<canvas id="mainChart"></canvas>

</div>

</div>

<div class="trade-side">

<div class="stat-box">

<div style="color:var(--text-dim)">

Tillgängligt saldo

</div>

<div
id="balanceDisplay"
style="font-size:1.5rem;
font-weight:bold;">

100 000 SEK

</div>

</div>

<div
id="tradeControls"
style="display:none;">

<label
style="font-size:0.8rem;
color:var(--text-dim)">

ANTAL

</label>

<input
type="number"
id="tradeAmount"
value="1"
min="1"
style="margin:10px 0 20px 0;">

<button
class="btn btn-buy"
onclick="genomförAffär('köp')">

KÖP

</button>

<button
class="btn btn-sell"
onclick="genomförAffär('sälj')">

SÄLJ

</button>

</div>

<div
class="portfolio-list"
id="portfolioDisplay">

<h4
style="border-bottom:1px solid var(--border);
padding-bottom:5px;">

PORTFÖLJ

</h4>

</div>

</div>

<script>

const symboler=[

"AAPL","MSFT","GOOGL","AMZN","NVDA","TSLA",
"META","BRK.B","UNH","V","JPM","JNJ","LLY",
"XOM","WMT","MA","AVGO","PG","ORCL","ADBE"

];

let aktier={};

let aktivAktie=null;

let saldo=100000;

let portfölj={};

let chart=null;

symboler.forEach(s=>{

let basPris=Math.random()*2000+50;

aktier[s]={

ticker:s,

pris:basPris,

history:Array.from(

{length:50},

()=>basPris+(Math.random()-0.5)*20

),

change:(Math.random()*4-2).toFixed(2)

};

});

function renderStockList(filter=""){

const container=document.getElementById('stockList');

container.innerHTML="";

Object.keys(aktier)

.filter(s=>s.includes(filter.toUpperCase()))

.forEach(s=>{

const div=document.createElement('div');

div.className=
`stock-item ${aktivAktie===s?'active':''}`;

div.onclick=()=>väljAktie(s);

div.innerHTML=

`<div><b>${s}</b></div>

<div class="${
aktier[s].change>=0?'up':'down'
}">

${aktier[s].pris.toFixed(2)}

</div>`;

container.appendChild(div);

});

}

function väljAktie(ticker){

aktivAktie=ticker;

document.getElementById('tradeControls')
.style.display='block';

document.getElementById('activeSymbol')
.innerText=ticker;

uppdateraAktiv();

initChart();

renderStockList(
document.getElementById('searchInput').value
);

}

function uppdateraAktiv(){

if(!aktivAktie)return;

const s=aktier[aktivAktie];

document.getElementById('activePrice')
.innerText=s.pris.toFixed(2)+" SEK";

document.getElementById('activePrice')
.className=s.change>=0?'up':'down';

}

function genomförAffär(typ){

let antal=parseInt(
document.getElementById('tradeAmount').value
);

if(!aktivAktie||isNaN(antal)||antal<=0){

alert("Ange giltigt antal!");

return;

}

const pris=aktier[aktivAktie].pris;

const kostnad=pris*antal;

if(typ==='köp'){

if(saldo>=kostnad){

saldo-=kostnad;

if(!portfölj[aktivAktie]){

portfölj[aktivAktie]={

antal:0,

totaltInköp:0

};

}

portfölj[aktivAktie].antal+=antal;

portfölj[aktivAktie].totaltInköp+=kostnad;

}

else{

alert("Otillräckligt saldo");

}

}

if(typ==='sälj'){

if(
portfölj[aktivAktie] &&
portfölj[aktivAktie].antal>=antal
){

const snitt=

portfölj[aktivAktie].totaltInköp/
portfölj[aktivAktie].antal;

saldo+=kostnad;

portfölj[aktivAktie].antal-=antal;

portfölj[aktivAktie].totaltInköp-=snitt*antal;

if(portfölj[aktivAktie].antal===0){

delete portfölj[aktivAktie];

}

}

else{

alert("Du äger inte så många");

}

}

uppdateraPortfölj();

}

function uppdateraPortfölj(){

document.getElementById('balanceDisplay')

.innerText=

saldo.toLocaleString(
'sv-SE',
{minimumFractionDigits:2}
)+" SEK";

const container=
document.getElementById('portfolioDisplay');

container.innerHTML=

'<h4 style="border-bottom:1px solid var(--border); padding-bottom:5px;">PORTFÖLJ</h4>';

for(let s in portfölj){

const antal=portfölj[s].antal;

const snitt=

portfölj[s].totaltInköp/antal;

const värde=

antal*aktier[s].pris;

const resultat=

värde-portfölj[s].totaltInköp;

const procent=

(resultat/portfölj[s].totaltInköp)*100;

container.innerHTML+=`

<div style="
margin-bottom:12px;
padding-bottom:10px;
border-bottom:1px solid #1a1a1a;
">

<div style="
display:flex;
justify-content:space-between;
font-weight:bold;
">

<span>

${s} (${antal} st)

</span>

<span>

${värde.toFixed(0)} kr

</span>

</div>

<div style="
font-size:0.75rem;
color:var(--text-dim);
margin-top:4px;
">

Snittpris:
${snitt.toFixed(2)} kr

</div>

<div class="${
resultat>=0?'up':'down'
}"

style="
font-size:0.75rem;
margin-top:2px;
">

Resultat:

${resultat>=0?'+':''}

${resultat.toFixed(0)} kr

(${procent.toFixed(2)}%)

</div>

</div>

`;

}

}

function filtreraAktier(){

renderStockList(

document.getElementById('searchInput').value

);

}

setInterval(()=>{

Object.keys(aktier).forEach(s=>{

const change=
1+(Math.random()-0.5)*0.01;

aktier[s].pris*=change;

aktier[s].history.push(
aktier[s].pris
);

aktier[s].history.shift();

});

uppdateraAktiv();

uppdateraPortfölj();

if(chart&&aktivAktie){

chart.data.datasets[0].data=
aktier[aktivAktie].history;

chart.update('none');

}

},2000);

renderStockList();

uppdateraPortfölj();

</script>

</body>
</html>
