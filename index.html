<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trading Platform Pro</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root {
    --bg: #050505;
    --surface: #121212;
    --border: #282828;
    --accent: #2962ff;
    --up: #00ffaa;
    --down: #ff3d71;
    --text: #ffffff;
    --text-dim: #b3b3b3;
}

body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    margin: 0;
    display: grid;
    grid-template-columns: 350px 1fr 300px;
    height: 100vh;      /* full viewport height */
    overflow: hidden;
}

/* Sidebar */
.market-side {
    display: grid;
    grid-template-rows: auto 1fr; /* search box auto, stock list fills remaining space */
    height: 100vh;
    background: var(--surface);
    border-right: 1px solid var(--border);
}

.search-box {
    padding: 15px;
    border-bottom: 1px solid var(--border);
}

input {
    width: 100%;
    background: #1e1e1e;
    border: 1px solid var(--border);
    padding: 10px;
    color: white;
    border-radius: 4px;
    box-sizing: border-box;
}

.stock-list {
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--accent) transparent;
    padding-right: 5px;
}

.stock-item {
    padding: 12px 15px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    transition: background 0.2s;
}

.stock-item:hover { background: #1a1a1a; }
.stock-item.active { background: #222; border-left: 3px solid var(--accent); }

/* Main Content */
.main-content {
    display: flex;
    flex-direction: column;
    padding: 20px;
    background: var(--bg);
    overflow: hidden;
}

.chart-container {
    flex-grow: 1;
    position: relative;
    min-height: 0; /* allow flex child to shrink */
}

/* Right Side - Trading */
.trade-side {
    border-left: 1px solid var(--border);
    padding: 20px;
    background: var(--surface);
}

.stat-box {
    margin-bottom: 20px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
}

.btn {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 4px;
    font-weight: bold;
    cursor: pointer;
    margin-top: 10px;
}

.btn-buy { background: var(--up); color: black; }
.btn-sell { background: var(--down); color: white; }

.portfolio-list {
    font-size: 0.85rem;
    margin-top: 20px;
}

.up { color: var(--up); }
.down { color: var(--down); }
</style>
</head>
<body>

<div class="market-side">
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Sök aktie (t.ex. AAPL, TSLA)..." oninput="filterStocks()">
    </div>
    <div class="stock-list" id="stockList"></div>
</div>

<div class="main-content">
    <div id="chartHeader">
        <h2 id="activeSymbol">Välj en aktie</h2>
        <h1 id="activePrice">0.00</h1>
    </div>
    <div class="chart-container">
        <canvas id="mainChart"></canvas>
    </div>
</div>

<div class="trade-side">
    <div class="stat-box">
        <div style="color: var(--text-dim)">Tillgängligt kapital</div>
        <div id="balanceDisplay" style="font-size: 1.5rem; font-weight: bold;">100 000.00 SEK</div>
    </div>

    <div id="tradeControls" style="display:none;">
        <label style="font-size: 0.8rem; color: var(--text-dim)">ANTAL</label>
        <input type="number" id="tradeAmount" value="1" min="1" style="margin: 10px 0 20px 0;">
        <button class="btn btn-buy" onclick="executeTrade('buy')">KÖP</button>
        <button class="btn btn-sell" onclick="executeTrade('sell')">SÄLJ</button>
    </div>

    <div class="portfolio-list" id="portfolioDisplay">
        <h4 style="border-bottom: 1px solid var(--border); padding-bottom: 5px;">PORTFÖLJ</h4>
    </div>
</div>

<script>
const symbols = ["Apple (AAPL)","Microsoft (MSFT)","Alphabet (GOOGL)","Amazon (AMZN)","Nvidia (NVDA)","Tesla (TSLA)","Meta (META)","Berkshire Hathaway-B (BRK.B)","UnitedHealth Group (UNH)","Visa (V)","JPMorgan Chase & Co (JPM)","Johnsson & Johnsson (JNJ)","Eli Lilly and Company (LLY)","Exxonmobil (XOM)","Walmart (WMT)","Mastercard (MA)","Broadcom (AVGO)","Procter & Gamble (PG)","Oracle (ORCL)","Adobe (ADBE)","ASML Holding N.V. (ASML)","Costco (COST)","Chevron (CVX)","Home Depot (HD)","Coca Cola (KO)","PepsiCo (PEP)","AbbVie (ABBV)","Merck & Co (MRK)","Bank of America Corp (BAC)","Astra Zeneca (AZN)","Fomento Economico (FMX)","Toyota (TM)","Novo Nordisk (NVO)","SAP SE (SAP)","Shell (SHEL)","Total Energies (TTE)","HSBC Holdings (HSBC)","Sony (SONY)","Unilever (UL)","Nike (NKE)","Walt Disney Company (DIS)","United Parcel Servie (UPS)","Philip Morris International (PM)","Intel Corp (INTC)","Advanced Micro Devices (AMD)","Texas Instruments(TXN)","Qualcomm (QCOM)","Verizon (VZ)","Applied Materials Inc (AMAT)"];
let stocks = {};
let activeTicker = null;
let balance = 100000;
let portfolio = {};
let chart = null;

// Initialize stock data
symbols.forEach(s => {
    let basePrice = Math.random() * 2000 + 50;
    stocks[s] = {
        ticker: s,
        price: basePrice,
        history: Array.from({length: 50}, () => basePrice + (Math.random()-0.5)*20),
        change: (Math.random()*4-2).toFixed(2)
    };
});

function renderStockList(filter="") {
    const container = document.getElementById('stockList');
    container.innerHTML = "";
    Object.keys(stocks).filter(s => s.includes(filter.toUpperCase())).forEach(s => {
        const div = document.createElement('div');
        div.className = `stock-item ${activeTicker===s ? 'active' : ''}`;
        div.onclick = () => selectStock(s);
        div.innerHTML = `<div><b>${s}</b></div>
                         <div class="${stocks[s].change>=0 ? 'up':'down'}">${stocks[s].price.toFixed(2)}</div>`;
        container.appendChild(div);
    });
}

function selectStock(ticker) {
    activeTicker = ticker;
    document.getElementById('tradeControls').style.display = 'block';
    document.getElementById('activeSymbol').innerText = ticker;
    updateActiveDisplay();
    renderStockList(document.getElementById('searchInput').value);
    initChart();
}

function updateActiveDisplay() {
    if(!activeTicker) return;
    const s = stocks[activeTicker];
    document.getElementById('activePrice').innerText = s.price.toFixed(2) + " SEK";
    document.getElementById('activePrice').className = s.change>=0 ? 'up':'down';
}

function initChart() {
    const ctx = document.getElementById('mainChart').getContext('2d');
    if(chart) chart.destroy();
    chart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: Array.from({length:50},(_,i)=>i),
            datasets:[{
                data: stocks[activeTicker].history,
                borderColor:'#2962ff',
                borderWidth:2,
                pointRadius:0,
                fill:true,
                backgroundColor:'rgba(41,98,255,0.05)',
                tension:0.2
            }]
        },
        options:{
            responsive:true,
            maintainAspectRatio:false,
            plugins:{legend:{display:false}},
            scales:{
                x:{display:false},
                y:{grid:{color:'#1a1a1a'}, ticks:{color:'#555'}}
            }
        }
    });
}

function executeTrade(type) {
    let amount = parseInt(document.getElementById('tradeAmount').value);
    if(!activeTicker || isNaN(amount) || amount<=0){
        alert("Ange ett giltigt antal aktier!");
        return;
    }

    const price = stocks[activeTicker].price;
    const totalCost = price*amount;

    if(type==='buy'){
        if(balance>=totalCost){
            balance -= totalCost;
            portfolio[activeTicker] = (portfolio[activeTicker]||0)+amount;
        } else { alert("Inte tillräckligt kapital!"); }
    } else if(type==='sell'){
        if(portfolio[activeTicker] && portfolio[activeTicker]>=amount){
            balance += totalCost;
            portfolio[activeTicker] -= amount;
            if(portfolio[activeTicker]===0) delete portfolio[activeTicker];
        } else { alert("Du har inte så många aktier!"); }
    }

    updatePortfolio();
}

function updatePortfolio() {
    document.getElementById('balanceDisplay').innerText = balance.toLocaleString('sv-SE',{minimumFractionDigits:2})+" SEK";
    const container = document.getElementById('portfolioDisplay');
    container.innerHTML='<h4 style="border-bottom:1px solid var(--border); padding-bottom:5px;">PORTFÖLJ</h4>';
    for(let s in portfolio){
        container.innerHTML += `<div style="display:flex; justify-content:space-between; margin-bottom:5px;">
            <span>${s} (${portfolio[s]} st)</span>
            <span>${(portfolio[s]*stocks[s].price).toFixed(0)} kr</span>
        </div>`;
    }
}

function filterStocks() { renderStockList(document.getElementById('searchInput').value); }

// Live price simulation
setInterval(()=>{
    Object.keys(stocks).forEach(s=>{
        const change = 1+(Math.random()-0.5)*0.01;
        stocks[s].price *= change;
        stocks[s].history.push(stocks[s].price);
        stocks[s].history.shift();
    });
    updateActiveDisplay();
    if(chart && activeTicker){
        chart.data.datasets[0].data = stocks[activeTicker].history;
        chart.update('none');
    }
},2000);

renderStockList();
updatePortfolio();
</script>
</body>
</html>
