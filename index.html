<!DOCTYPE html>
<html lang="sv">
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PaperAlpha</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>

<script src="https://cdn.jsdelivr.net/npm/chartjs-chart-financial"></script>

<script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8/hammer.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>

<style>

:root{

--bg:#050505;
--surface:#121212;
--border:#282828;
--accent:#2962ff;
--up:#00ffaa;
--down:#ff3d71;
--text:#ffffff;
--text-dim:#b3b3b3;

}

body{

font-family:'Inter',-apple-system,sans-serif;

background:var(--bg);

color:var(--text);

margin:0;

display:grid;

grid-template-columns:350px 1fr 300px;

height:100vh;

overflow:hidden;

}

.market-side{

display:grid;

grid-template-rows:auto 1fr;

height:100vh;

background:var(--surface);

border-right:1px solid var(--border);

}

.search-box{

padding:15px;

border-bottom:1px solid var(--border);

}

input{

width:100%;

background:#1e1e1e;

border:1px solid var(--border);

padding:10px;

color:white;

border-radius:4px;

box-sizing:border-box;

}

.stock-list{

overflow-y:auto;

scrollbar-width:thin;

scrollbar-color:var(--accent) transparent;

padding-right:5px;

}

.stock-item{

padding:12px 15px;

border-bottom:1px solid var(--border);

cursor:pointer;

display:flex;

justify-content:space-between;

transition:background 0.2s;

}

.stock-item:hover{

background:#1a1a1a;

}

.stock-item.active{

background:#222;

border-left:3px solid var(--accent);

}

.main-content{

display:flex;

flex-direction:column;

padding:20px;

background:var(--bg);

overflow:hidden;

}

.chart-container{

flex-grow:1;

position:relative;

min-height:0;

}

.trade-side{

border-left:1px solid var(--border);

padding:20px;

background:var(--surface);

}

.stat-box{

margin-bottom:20px;

padding-bottom:20px;

border-bottom:1px solid var(--border);

}

.btn{

width:100%;

padding:12px;

border:none;

border-radius:4px;

font-weight:bold;

cursor:pointer;

margin-top:10px;

}

.btn-buy{

background:var(--up);

color:black;

}

.btn-sell{

background:var(--down);

color:white;

}

.portfolio-list{

font-size:0.85rem;

margin-top:20px;

}

.up{color:var(--up);}
.down{color:var(--down);}
.trade-error{
color:var(--down);
font-size:0.95rem;
font-weight:700;
margin-top:-10px;
margin-bottom:10px;
min-height:22px;
}

</style>

</head>

<body>

<div class="market-side">

<div class="search-box">

<input
type="text"
id="searchInput"
placeholder="Sök aktie..."
oninput="filtreraAktier()">

</div>

<div
class="stock-list"
id="stockList">

</div>

</div>

<div class="main-content">

<div style="margin-bottom:10px;">

<button class="btn"
style="width:auto;background:#1e1e1e;color:white;margin-right:5px;"
onclick="setChartMode('live')"
id="liveBtn">

REALTID

</button>

<button class="btn"
style="width:auto;background:#1e1e1e;color:white;"
onclick="setChartMode('history')"
id="historyBtn">

HISTORISKT

</button>

</div>
  
<div>

<h2 id="activeSymbol">

Välj en aktie

</h2>

<h1 id="activePrice">

0.00

</h1>

</div>

<div class="chart-container">

<canvas id="mainChart"></canvas>

</div>

</div>

<div class="trade-side">

<div class="stat-box">

<div style="color:var(--text-dim)">

Tillgängligt saldo

</div>

<div
id="balanceDisplay"
style="font-size:1.5rem;
font-weight:bold;">

10 000 USD

</div>

</div>

<div
id="tradeControls"
style="display:none;">

<label
style="font-size:0.8rem;
color:var(--text-dim)">

ANTAL

</label>

<input
type="number"
id="tradeAmount"
value="1"
min="1"
style="margin:10px 0 20px 0;">

<div id="tradeError" class="trade-error"></div>

<button
class="btn btn-buy"
onclick="genomförAffär('köp')">

KÖP

</button>

<button
class="btn btn-sell"
onclick="genomförAffär('sälj')">

SÄLJ

</button>

</div>

<div
class="portfolio-list"
id="portfolioDisplay">

<h4
style="border-bottom:1px solid var(--border);
padding-bottom:5px;">

PORTFÖLJ

</h4>

</div>

</div>

<script>

const symboler=[
"Berkshire Hathaway Inc (BRK-B)",  "Apple Inc (AAPL)", "Goldman Sachs Group Inc (GS)"
];

let aktier={};

let liveAutoScrollEnabled = true; // true when we want LIVE to auto pan
  
let aktivAktie=null;

let saldo=10000;

let portfölj={};

let chart=null;

let chartMode='live'; // live or history

const LIVE_CANDLES=30;

  
let priceFlashTimeout=null;

const CHART_WINDOW_MS=20*60*1000;

const MAX_CANDLES=400;

const CANDLE_MS=60000;
const PRICE_UPDATE_MS=2000;

function renderStockList(filter=""){

const container=document.getElementById('stockList');

container.innerHTML="";

const sökord = filter.toLowerCase();

Object.keys(aktier)
    .filter(s => {
        if (sökord === "") return true;
        const namn = s.split(' (')[0].toLowerCase();
        const ticker = s.split(' (')[1].replace(')', '').toLowerCase();
        return namn.startsWith(sökord) || ticker.startsWith(sökord);
    })

.forEach(s=>{

const div=document.createElement('div');

div.className=
`stock-item ${aktivAktie===s?'active':''}`;

div.onclick=()=>väljAktie(s);


const p = aktier[s].pris;
const priceText = (p === null) ? "API unavailable" : p.toFixed(2);

div.innerHTML =
`<div><b>${s}</b></div>
<div>${priceText}</div>`;

container.appendChild(div);

});

}

function väljAktie(ticker){
    aktivAktie = ticker;

    document.getElementById('tradeControls').style.display = 'block';
    document.getElementById('activeSymbol').innerText = ticker;

    uppdateraAktiv();
    
    // Se till att vi kör updateChartView så fort charten skapas i initChart
    initChart(); 

    renderStockList(document.getElementById('searchInput').value);
}


function uppdateraAktiv(riktning=null){

if(!aktivAktie)return;

const s=aktier[aktivAktie];

const priceEl=document.getElementById('activePrice');

if (s.pris === null) {
  priceEl.innerText = "API unavailable";
} else {
  priceEl.innerText = s.pris.toFixed(2) + " USD";
}
priceEl.classList.remove('up','down');

if(riktning==='up'||riktning==='down'){
priceEl.classList.add(riktning);
if(priceFlashTimeout){
clearTimeout(priceFlashTimeout);
}
priceFlashTimeout=setTimeout(()=>{
priceEl.classList.remove('up','down');
},700);
}

}

function visaTradeFel(){
document.getElementById('tradeError').innerText="Fel har uppstått! Försök igen";
}

function rensaTradeFel(){
document.getElementById('tradeError').innerText="";
}

function sättDiagramTidsfönster(){

if(!chart||!aktivAktie)return;

const s=aktier[aktivAktie];

if(!s.history.length)return;

if(!s.chartSessionStart)s.chartSessionStart=s.history[0].x;

const nu=Date.now();

const start=s.chartSessionStart;

if(typeof chart.resetZoom==='function')chart.resetZoom();

if(nu<=start+CHART_WINDOW_MS){

chart.options.scales.x.min=start;

chart.options.scales.x.max=start+CHART_WINDOW_MS;

}else{

chart.options.scales.x.min=nu-CHART_WINDOW_MS;

chart.options.scales.x.max=nu;

}

}

function initChart(){

const ctx=
document.getElementById('mainChart')
.getContext('2d');

if(chart) chart.destroy();

chart=new Chart(ctx,{

type:'candlestick',

data:{

datasets:[{

data:aktier[aktivAktie].history,

color:{
up:'#00ffaa',
down:'#ff3d71',
unchanged:'#00ffaa'
}

}]

},

options:{

responsive:true,

maintainAspectRatio:false,

animation:false,

plugins:{
legend:{display:false},
tooltip:{
enabled:true,
displayColors:false,
intersect:true,
mode:'nearest',
callbacks:{
title:()=>'',
label:function(ctx){

const r=ctx.raw||ctx.parsed;

if(!r)return'';

const c=r.c!==undefined?r.c:r.close;

if(c===undefined)return'';

return Number(c).toFixed(2);

}
}
},
zoom:{
pan:{
enabled:true,
mode:'xy'
},
zoom:{
wheel:{enabled:true},
pinch:{enabled:true},
mode:'xy'
}
}
},

scales:{

x:{
type:'time',
time:{
unit:'minute',
minUnit:'minute',
tooltipFormat:'dd/MM HH:mm',
displayFormats:{minute:'HH:mm'}
},
grid:{color:'#1a1a1a'},
ticks:{
color:'#666',
maxRotation:0,
autoSkip:true,
maxTicksLimit:5,
autoSkipPadding:28,
callback:function(value,index,ticks){

const d=new Date(value);

const label=d.toLocaleTimeString('sv-SE',{
hour:'2-digit',
minute:'2-digit',
hour12:false
});

if(index>0&&ticks&&ticks[index-1]){

const prev=new Date(ticks[index-1].value);

const prevLabel=prev.toLocaleTimeString('sv-SE',{
hour:'2-digit',
minute:'2-digit',
hour12:false
});

if(label===prevLabel)return '';

}

return label;

}
}
},

y:{
grid:{color:'#1a1a1a'},
ticks:{color:'#666'},
grace:'5%'
}

}

}

});

chart.options.plugins.zoom.onPan = function() {
    if(chartMode === 'live'){
        liveAutoScrollEnabled = false; // user manually moved chart
    }
};
chart.options.plugins.zoom.onZoom = function() {
    if(chartMode === 'live'){
        liveAutoScrollEnabled = false; // user manually zoomed
    }
};

// VIKTIGT: Anropa updateChartView direkt här för att sätta 75%-vyn innan ritning
    updateChartView();
}

async function initAktier() {
    for (const s of symboler) {
        const fetched = await fetchPrice(s);
        const pris = fetched ?? null;
        aktier[s] = {
            ticker: s,
            pris: pris,
            available: pris !== null,
            history: [],
            chartSessionStart: null,
            change: 0
        };
        aktier[s].history.push({
            x: Date.now(),
            o: pris,
            h: pris,
            l: pris,
            c: pris
        });
    }

    renderStockList();
    uppdateraPortfölj();
    väljAktie(symboler[0]);
    setChartMode('live');

    // start live updates now
    startLiveUpdates();
}

initAktier();
async function fetchPrice(ticker) {
  try {
    const cleanTicker = ticker.split(' (')[1].replace(')', '');
    const response = await fetch(`https://server-api-vxhy.onrender.com/api/price/${encodeURIComponent(cleanTicker)}`);

    if (!response.ok) return null; // 关键：500/404 时直接失败

    const data = await response.json();
    const price = Number(data.c);

    if (!Number.isFinite(price)) return null; // 防止返回格式不对
    return price;
  } catch (err) {
    console.error("API error for", ticker, err);
    return null;
  }
}


function setChartMode(mode){
    chartMode = mode;

    document.getElementById('liveBtn').style.background =
        mode==='live' ? '#2962ff' : '#1e1e1e';
    document.getElementById('historyBtn').style.background =
        mode==='history' ? '#2962ff' : '#1e1e1e';

    liveAutoScrollEnabled = (mode === 'live');

    // AUTO ZOOM ONLY WHEN SWITCHING MODE
    if(mode === 'history' && chart && aktivAktie){

        const history = aktier[aktivAktie].history;

        if(typeof chart.resetZoom === 'function'){
            chart.resetZoom();
        }

        if(history.length){
            const first = history[0].x;
            const last = history[history.length-1].x;

            const padding = (last-first)*0.05;

            chart.options.scales.x.min = first - padding;
            chart.options.scales.x.max = last + padding;

            chart.options.scales.y.min = undefined;
            chart.options.scales.y.max = undefined;

            chart.update('none');
        }
    }

if(mode === 'history' && chart && aktivAktie){

    const history = aktier[aktivAktie].history;

    if(typeof chart.resetZoom === 'function'){
        chart.resetZoom();
    }

    if(history.length){
        const first = history[0].x;
        const last = history[history.length-1].x;

        const padding = (last-first)*0.05;

        chart.options.scales.x.min = first - padding;
        chart.options.scales.x.max = last + padding;

        chart.options.scales.y.min = undefined;
        chart.options.scales.y.max = undefined;

        chart.update('none');
    }
}
  
    updateChartView();
}
  

  
function updateChartView(){
    if(!chart || !aktivAktie) return;

    const history = aktier[aktivAktie].history;

    if(chartMode === 'live'){
        chart.data.datasets[0].data = history; 

        if(liveAutoScrollEnabled && history.length){
            const newest = history[history.length - 1].x;
            const viewWindow = 30 * 60 * 1000; 
            const rightPadding = viewWindow * 0.33;

            chart.options.scales.x.min = newest - (viewWindow - rightPadding);
            chart.options.scales.x.max = newest + rightPadding;

            // Vertikal centrering
            const visibleCandles = history.filter(c => c.x >= chart.options.scales.x.min);
            if(visibleCandles.length > 0) {
                const highs = visibleCandles.map(c => c.h);
                const lows = visibleCandles.map(c => c.l);
                const maxPrice = Math.max(...highs);
                const minPrice = Math.min(...lows);
                const margin = (maxPrice - minPrice) * 0.2;

                chart.options.scales.y.min = minPrice - margin;
                chart.options.scales.y.max = maxPrice + margin;
            }
        }

        // --- HÄR LÅSER VI LIVE-LÄGET ---
        chart.options.plugins.zoom.pan.enabled = false;
        chart.options.plugins.zoom.zoom.wheel.enabled = false;
        chart.options.plugins.zoom.zoom.pinch.enabled = false;


      
   } else {

    chart.data.datasets[0].data = history;

    // Tillåt fri zoom/pan
    chart.options.plugins.zoom.pan.enabled = true;
    chart.options.plugins.zoom.zoom.wheel.enabled = true;
    chart.options.plugins.zoom.zoom.pinch.enabled = true;

}
  
    chart.options.scales.y.beginAtZero = false; 
    chart.update('none'); 
}

  
function genomförAffär(typ){

const råVärde=document.getElementById('tradeAmount').value.trim();

if(!aktivAktie||!/^\d+$/.test(råVärde)){

visaTradeFel();

return;

}

let antal=parseInt(råVärde,10);

if(isNaN(antal)||antal<=0){

visaTradeFel();

return;

}

const pris=aktier[aktivAktie].pris;

const kostnad=pris*antal;

if(typ==='köp'){

if(saldo>=kostnad){

saldo-=kostnad;

if(!portfölj[aktivAktie]){

portfölj[aktivAktie]={

antal:0,

totaltInköp:0

};

}

portfölj[aktivAktie].antal+=antal;

portfölj[aktivAktie].totaltInköp+=kostnad;

rensaTradeFel();

}

else{

visaTradeFel();

return;
}

}

if(typ==='sälj'){

if(
portfölj[aktivAktie] &&
portfölj[aktivAktie].antal>=antal
){

const snitt=

portfölj[aktivAktie].totaltInköp/
portfölj[aktivAktie].antal;

saldo+=kostnad;

portfölj[aktivAktie].antal-=antal;

portfölj[aktivAktie].totaltInköp-=snitt*antal;

if(portfölj[aktivAktie].antal===0){

delete portfölj[aktivAktie];

}

rensaTradeFel();

}

else{

visaTradeFel();

return;
}

}

uppdateraPortfölj();

}

function uppdateraPortfölj(){

document.getElementById('balanceDisplay')

.innerText=

saldo.toLocaleString(
'sv-SE',
{minimumFractionDigits:2}
)+" USD";

const container=
document.getElementById('portfolioDisplay');

container.innerHTML=

'<h4 style="border-bottom:1px solid var(--border); padding-bottom:5px;">PORTFÖLJ</h4>';

for(let s in portfölj){

const antal=portfölj[s].antal;

const snitt=

portfölj[s].totaltInköp/antal;

const värde=

antal*aktier[s].pris;

const resultat=

värde-portfölj[s].totaltInköp;

const procent=

(resultat/portfölj[s].totaltInköp)*100;

container.innerHTML+=`

<div style="
margin-bottom:12px;
padding-bottom:10px;
border-bottom:1px solid #1a1a1a;
">

<div style="
display:flex;
justify-content:space-between;
font-weight:bold;
">

<span 
style="
cursor:pointer;
color:#2962ff;
text-decoration:none;
"
onclick="väljAktie('${s}')"
onmouseover="this.style.textDecoration='underline'"
onmouseout="this.style.textDecoration='none'"
>
${s} (${antal} st)
</span>

<span>

${värde.toFixed(0)} USD

</span>

</div>

<div style="
font-size:0.75rem;
color:var(--text-dim);
margin-top:4px;
">

Snittpris:
${snitt.toFixed(2)} USD

</div>

<div class="${
resultat>=0?'up':'down'
}"

style="
font-size:0.75rem;
margin-top:2px;
">

Resultat:

${resultat>=0?'+':''}

${resultat.toFixed(0)} USD

(${procent.toFixed(2)}%)

</div>

</div>

`;

}

}

function filtreraAktier(){

renderStockList(

document.getElementById('searchInput').value

);

}

/* Live pris */
async function startLiveUpdates() {
    setInterval(async () => {
        let aktivRiktning = null;

        const promises = Object.keys(aktier).map(async (s) => {
            const aktie = aktier[s];
            if (!aktie) return; // ignore uninitialized stocks

            const gammaltPris = aktie.pris;
            const nyttPris = await fetchPrice(s);
            if (nyttPris === null) return;

            aktie.pris = nyttPris;

            if (s === aktivAktie) {
                if (nyttPris > gammaltPris) aktivRiktning = 'up';
                else if (nyttPris < gammaltPris) aktivRiktning = 'down';
            }

            // Candle logic here...
            let nu = Date.now();
            let siste = aktie.history[aktie.history.length - 1];
            if (!siste) {
                aktie.history.push({
                    x: nu,
                    o: nyttPris,
                    h: nyttPris,
                    l: nyttPris,
                    c: nyttPris
                });
                return;
            }

            if (nu - siste.x < CANDLE_MS) {
                siste.c = nyttPris;
                siste.h = Math.max(siste.h, siste.o, siste.c);
                siste.l = Math.min(siste.l, siste.o, siste.c);
            } else {
                aktie.history.push({
                    x: nu,
                    o: siste.c,
                    h: Math.max(siste.c, nyttPris),
                    l: Math.min(siste.c, nyttPris),
                    c: nyttPris
                });
                if (aktie.history.length > MAX_CANDLES) aktie.history.shift();
            }
        });

        await Promise.all(promises);

        uppdateraAktiv(aktivRiktning);
        uppdateraPortfölj();
        if (chart && aktivAktie) updateChartView();
        renderStockList(document.getElementById('searchInput').value);

    }, PRICE_UPDATE_MS);
}
  

document.getElementById('tradeAmount').addEventListener('input', rensaTradeFel);


  
</script>

</body>
</html>
